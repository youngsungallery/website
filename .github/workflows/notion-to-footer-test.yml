# .github/workflows/notion-to-footer-test.yml

name: Fetch Notion Footer Test Content

on:
  workflow_dispatch:
  push:
    branches:
      - main
  # ✨ 이 부분을 추가해 줘! (한국 시간 오후 9시 40분에 실행) ✨
  schedule:
    - cron: '40 12 * * *' # UTC 12:40 (KST 21:40)에 실행
      # cron 표현식 설명:
      # (분 시 일 월 요일)
      # 40분 12시 (UTC) -> 한국 시간 (KST)으로 12시 + 9시간 = 21시 (오후 9시) 40분

jobs:
  fetch-notion-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Fetch Notion Page Content and Update Footer
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_INTEGRATION_TOKEN }}
          NOTION_TEST_PAGE_ID: ${{ secrets.NOTION_TEST_PAGE_ID }}
        run: |
          echo "Debugging Notion API fetch process:"
          echo "NOTION_TEST_PAGE_ID: ${NOTION_TEST_PAGE_ID}"

          NOTION_API_RESPONSE=$(curl -s -X GET "https://api.notion.com/v1/blocks/$NOTION_TEST_PAGE_ID/children?page_size=100" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28")
          
          echo "--- Notion API Raw Response (first 500 chars) ---"
          echo "${NOTION_API_RESPONSE}" | head -c 500
          echo ""

          if [ -z "${NOTION_API_RESPONSE}" ]; then
            echo "Error: Notion API response is empty. Check NOTION_TEST_PAGE_ID and NOTION_TOKEN permissions."
            exit 1
          fi

          NOTION_TEXT_RAW=$(echo "${NOTION_API_RESPONSE}" | jq -r '
            [
              .results[]
              | select(.type == "paragraph" and (.paragraph.rich_text | length > 0))
              | .paragraph.rich_text[]
              | .plain_text
            ]
            | join("\n")
          ')
          
          JQ_EXIT_CODE=$?
          if [ $JQ_EXIT_CODE -ne 0 ]; then
            echo "Error: jq command failed with exit code $JQ_EXIT_CODE. Raw Notion API response might not be valid JSON or not match jq filter."
            exit 1
          fi
          
          echo "--- Processed Notion Text ---"
          echo "${NOTION_TEXT_RAW}"
          echo "-----------------------------"

          TIMESTAMP=$(TZ='Asia/Seoul' date "+%Y.%m.%d %H:%M:%S")
          
          JSON_CONTENT=$(jq -n \
            --arg text "${NOTION_TEXT_RAW}" \
            --arg timestamp "${TIMESTAMP}" \
            '{notionTestMessage: ($text + "\n(깃허브 커밋 " + $timestamp + ")")}'
          )
          
          echo "Generated JSON: $JSON_CONTENT"
          
          mkdir -p public/data || true
          echo "$JSON_CONTENT" > public/data/footer-test-data.json
          
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/footer-test-data.json
          git commit -m " chore(notion): Update footer test data from Notion ($TIMESTAMP) " || echo "No changes to commit"
          git push