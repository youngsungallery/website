# .github/workflows/notion-to-footer-test.yml

name: Fetch Notion Footer Test Content

on:
  workflow_dispatch:
  push:
    branches:
      - main # main 브랜치에 푸시될 때 워크플로우가 자동으로 실행되게 함
      # - dev # 개발 브랜치가 있다면 추가

jobs:
  fetch-notion-content:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Fetch Notion Page Content and Update Footer
        env: # GitHub Secrets에 등록한 변수들을 환경 변수로 불러옴
          NOTION_TOKEN: ${{ secrets.NOTION_INTEGRATION_TOKEN }}
          NOTION_TEST_PAGE_ID: ${{ secrets.NOTION_TEST_PAGE_ID }}
        run: |
          echo "Fetching Notion page: $NOTION_TEST_PAGE_ID"
          
          # Notion API 호출하여 페이지 블록 내용 가져오기 (여러 줄 지원)
          # jq를 사용하여 여러 문단을 '\n'으로 연결
          NOTION_TEXT_RAW=$(curl -s -X GET "https://api.notion.com/v1/blocks/$NOTION_TEST_PAGE_ID/children?page_size=100" \
            -H "Authorization: Bearer $NOTION_TOKEN" \
            -H "Notion-Version: 2022-06-28" \
            | jq -r '
              [
                .results[]
                | select(.type == "paragraph" and .paragraph.rich_text | length > 0) # 내용 있는 paragraph만
                | .paragraph.rich_text[]
                | .plain_text
              ]
              | join("\n")
            ')
          
          # 현재 시각 생성
          TIMESTAMP=$(TZ='Asia/Seoul' date "+%Y.%m.%d %H:%M:%S") # 타임존 한국 시간으로 설정
          
          # jq를 사용하여 JSON 데이터를 안전하게 생성 (Shell 변수 내용을 자동으로 이스케이프)
          JSON_CONTENT=$(jq -n \
            --arg text "${NOTION_TEXT_RAW}" \
            --arg timestamp "${TIMESTAMP}" \
            '{notionTestMessage: ($text + " (깃허브 커밋 " + $timestamp + ")")}'
          )
          
          echo "Generated JSON: $JSON_CONTENT"
          
          # public/data/footer-test-data.json 파일 생성 (없으면 생성, 있으면 덮어쓰기)
          mkdir -p public/data || true # mkdir -p는 이미 존재해도 오류 안 나게
          echo "$JSON_CONTENT" > public/data/footer-test-data.json
          
          # 변경된 파일을 Git에 커밋하고 푸시
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/footer-test-data.json
          git commit -m " chore(notion): Update footer test data from Notion ($TIMESTAMP) " || echo "No changes to commit"
          git push
