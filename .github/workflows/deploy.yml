name: Deploy to GitHub Pages (v2)

on:
  push:
    branches:
      - main # main 브랜치에 푸시될 때 워크플로우 실행

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # 최신 Ubuntu 환경에서 실행

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3 # 저장소 코드 체크아웃 (main 브랜치)

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20' # 프로젝트에 맞는 Node.js 버전 (Core_Memory에서 20 확인)

      - name: Install dependencies
        run: npm install # 프로젝트 의존성 설치

      - name: Build project
        run: npm run build # Vue.js 프로젝트 빌드 (dist 폴더 생성)

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3 # gh-pages 액션 사용
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub 제공 토큰 사용 (공개 저장소이므로 사용 가능)
          publish_dir: ./dist # 빌드 결과물이 있는 폴더 지정
          publish_branch: gh-pages # 결과물을 푸시할 브랜치 지정
